apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
data:
  KC_DB: postgres
  KC_DB_URL_HOST: postgres
  KC_DB_URL_DATABASE: keycloak
  KC_HOSTNAME: https://placeholder.invalid
  KC_HOSTNAME_STRICT: "true"
  KC_PROXY_HEADERS: xforwarded
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"