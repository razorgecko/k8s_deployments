apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - clusterissuer-staging.yaml
  - clusterissuer-prod.yaml

configMapGenerator:
  - name: params
    behavior: create
    envs:
      - params.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source: { kind: ConfigMap, name: params, fieldPath: data.email }
    targets:
      - select: { kind: ClusterIssuer }
        fieldPaths:
          - spec.acme.email


