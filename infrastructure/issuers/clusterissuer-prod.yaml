apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production endpoint — real, trusted certs. Strict rate limits.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: placeholder@invalid.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik