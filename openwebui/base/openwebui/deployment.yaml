apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
spec:
  replicas: 1
  strategy:
    type: Recreate # avoid RWO collisions on pod update
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      serviceAccountName: open-webui
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: openwebui-config
            - secretRef:
                name: openwebui-oidc
                optional: true
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://webui:$(POSTGRES_PASSWORD)@postgres:5432/webui
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data